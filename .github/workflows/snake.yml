name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake from contribution graph
        uses: Platane/snk@v3          # note: full action, not /svg-only
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.gif?color_snake=#00d4ff&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353


      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
